<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Sorteos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00eaff">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #000, #111);
  color: white;
  text-align: center;
}

/* NEON */
.neon {
  text-shadow:
    0 0 5px #00eaff,
    0 0 10px #00eaff,
    0 0 20px #00eaff;
}

/* SECCIONES */
.container { padding: 20px; }
.hidden { display: none; }

button {
  padding: 12px;
  margin: 6px;
  border: none;
  border-radius: 10px;
  background: #00eaff;
  font-weight: bold;
}

/* SLOT */
.slot {
  font-size: 60px;
  width: 80px;
  height: 90px;
  background: #111;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  margin: 5px;
  border-radius: 10px;
  box-shadow: 0 0 10px #00eaff inset;
}

.spin { animation: spin 0.5s; }
@keyframes spin {
  from { transform: translateY(-100px); opacity:0; }
  to { transform: translateY(0); opacity:1; }
}

/* MUSICA */
#musicBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 22px;
  background: none;
  color: white;
}
</style>
</head>

<body>

<button id="musicBtn">🔇</button>
<audio id="music" loop src="quinelasolicaria.mp3"></audio>

<!-- HOME -->
<div id="home" class="container">
  <h1>FM Cielo 105.5</h1>
  <h2 class="neon">Todo no se puede</h2>
  <button onclick="irCarga()">Nuevo sorteo</button>
</div>

<!-- CARGA -->
<div id="carga" class="container hidden">
  <h2 class="neon">Carga de participantes</h2>

  <input type="file" id="fileInput"><br><br>

  <input id="numeroInput" maxlength="3" placeholder="000">
  <button id="btnAgregar" onclick="agregarNumero()">Agregar</button>

  <p id="contador"></p>
  <p id="porcentaje"></p>
  <p id="dup"></p>

  <button onclick="finalizar()">Finalizar sorteo</button>
</div>

<!-- SORTEO -->
<div id="sorteo" class="container hidden">
  <h2 class="neon">Sorteo en vivo</h2>

  <div id="info"></div>

  <div>
    <div class="slot" id="s0">?</div>
    <div class="slot" id="s1">?</div>
    <div class="slot" id="s2">?</div>
  </div>

  <button id="b0" onclick="tirar(0)">Centena</button>
  <button id="b1" onclick="tirar(1)">Decena</button>
  <button id="b2" onclick="tirar(2)">Unidad</button>

  <p id="posibles"></p>
  <h2 id="resultado"></h2>

  <button onclick="volver()">Volver</button>
</div>

<script>
let numeros = [];
let duplicados = 0;
let resultado = ["?","?","?"];

/* ---------------- MUSICA FIX ---------------- */
let isPlaying = false;
const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");

musicBtn.onclick = () => {
  if (!isPlaying) {
    music.play().catch(()=>{});
    musicBtn.textContent = "🎵";
  } else {
    music.pause();
    musicBtn.textContent = "🔇";
  }
  isPlaying = !isPlaying;
};

/* ---------------- NAV ---------------- */
function irCarga() {
  home.classList.add("hidden");
  carga.classList.remove("hidden");
  numeroInput.focus();
}

function finalizar() {
  if (!numeros.length) {
    alert("Debe cargar números");
    return;
  }

  if (!confirm("¿Finalizar carga?")) return;

  carga.classList.add("hidden");
  sorteo.classList.remove("hidden");

  info.innerHTML =
    `Participación: ${(numeros.length/1000*100).toFixed(1)}%<br>
     Duplicados: ${duplicados}`;
}

/* ---------------- INPUT UX ---------------- */
numeroInput.addEventListener("input", () => {
  if (numeroInput.value.length === 3) {
    btnAgregar.focus();
  }
});

numeroInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") agregarNumero();
});

/* ---------------- CARGA ---------------- */
function agregarNumero() {
  let n = numeroInput.value;

  if (!/^\d{3}$/.test(n)) {
    alert("Debe ser de 3 cifras");
    return;
  }

  if (numeros.includes(n)) duplicados++;

  numeros.push(n);

  numeroInput.value = "";
  numeroInput.focus();

  actualizar();
}

/* ---------------- EXCEL ---------------- */
fileInput.addEventListener("change", e => {
  let file = e.target.files[0];

  if (!file.name.toLowerCase().includes("sorteo")) {
    alert("Nombre incorrecto");
    return;
  }

  let reader = new FileReader();

  reader.onload = evt => {
    let wb = XLSX.read(evt.target.result, {type:"array"});
    let rows = XLSX.utils.sheet_to_json(
      wb.Sheets[wb.SheetNames[0]], {header:1}
    );

    rows.forEach(r => {
      let val = r[0];
      if (/^\d{3}$/.test(val)) {
        if (numeros.includes(val)) duplicados++;
        numeros.push(val);
      }
    });

    actualizar();
  };

  reader.readAsArrayBuffer(file);
});

/* ---------------- STATS ---------------- */
function actualizar() {
  contador.innerText = "Cargados: " + numeros.length;
  porcentaje.innerText =
    "Progreso: " + ((numeros.length/999)*100).toFixed(1) + "%";
  dup.innerText = "Duplicados: " + duplicados;
}

/* ---------------- SORTEO ---------------- */
function tirar(pos) {
  if (resultado[pos] !== "?") return;

  let slot = document.getElementById("s"+pos);
  slot.classList.add("spin");

  let n = Math.floor(Math.random()*10);

  setTimeout(()=>{
    slot.textContent = n;
    resultado[pos] = n;

    document.getElementById("b"+pos).disabled = true;

    mostrarPosibles(pos);

    if (!resultado.includes("?")) checkGanador();
  },300);
}

/* ---------------- POSIBLES CORREGIDO ---------------- */
function mostrarPosibles(pos) {
  let filtrados = numeros;

  if (resultado[0] !== "?") {
    filtrados = filtrados.filter(n => n[0] == resultado[0]);
  }

  if (resultado[1] !== "?") {
    filtrados = filtrados.filter(n => n[1] == resultado[1]);
  }

  let set = new Set();

  if (pos === 0) {
    filtrados.forEach(n => set.add(n[1]));
    posibles.innerText = "Posibles decena: " + [...set].sort().join(", ");
  }

  if (pos === 1) {
    filtrados.forEach(n => set.add(n[2]));
    posibles.innerText = "Posibles unidad: " + [...set].sort().join(", ");
  }
}

/* ---------------- RESULTADO ---------------- */
function checkGanador() {
  let num = resultado.join("");

  let ganadores = numeros.filter(n => n === num);

  if (ganadores.length) {
    resultado.innerText =
      ganadores.length === 1
        ? "🎉 Hay 1 ganador"
        : `🎉 ${ganadores.length} ganadores`;
  } else {
    resultado.innerText = "Hoy no hay premio";
  }
}

/* ---------------- RESET ---------------- */
function volver() {
  if (resultado.includes("?")) {
    alert("Debe terminar el sorteo");
    return;
  }
  location.reload();
}

/* ---------------- PWA ---------------- */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
