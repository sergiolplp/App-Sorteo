<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App Sorteos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00eaff">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #000, #111);
  color: white;
  text-align: center;
}

/* NEON */
.neon { text-shadow: 0 0 5px #00eaff,0 0 10px #00eaff,0 0 20px #00eaff; }
.neon-pink {
  color: #ff00c8;
  text-shadow: 0 0 5px #ff00c8,0 0 10px #ff00c8,0 0 20px #ff00c8;
}

/* BOTONES */
button {
  padding: 12px;
  margin: 6px;
  border: none;
  border-radius: 10px;
  background: #00eaff;
  color: #ff00c8;
  font-weight: bold;
}

/* BANNER */
.banner {
  font-size: 24px;
  color: #ff00c8;
  text-shadow: 0 0 15px #ff00c8;
  animation: pulse 1.5s infinite alternate;
}
@keyframes pulse { from{transform:scale(1)} to{transform:scale(1.05)} }

/* SLOT */
.slot {
  font-size: 60px;
  width: 80px;
  height: 90px;
  background: #111;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  margin: 5px;
  border-radius: 10px;
  box-shadow: 0 0 10px #00eaff inset;
}
.spin { animation: spin .5s; }
@keyframes spin {
  from { transform: translateY(-100px); opacity:0; }
  to { transform: translateY(0); opacity:1; }
}

/* GANADOR */
.win { animation: flash .5s alternate infinite; }
@keyframes flash {
  from { background:#001a00 }
  to { background:#003300 }
}

#musicBtn {
  position: fixed;
  top:10px; right:10px;
  font-size:22px;
  background:none;
  color:white;
}

.hidden { display:none; }
.container { padding:20px; }

input {
  padding:12px;
  border-radius:10px;
  border:none;
  text-align:center;
  font-size:18px;
}
</style>
</head>

<body>

<button id="musicBtn">🔇</button>
<audio id="music" loop src="quinelasolicaria.mp3"></audio>

<!-- HOME -->
<div id="home" class="container">
  <h1 class="neon-pink">FM Cielo 105.5</h1>
  <h2 class="neon">Todo no se puede</h2>
  <button onclick="irCarga()">Nuevo sorteo</button>
  <div class="banner">¡Subila Nacho!</div>
</div>

<!-- CARGA -->
<div id="carga" class="container hidden">
  <h2 class="neon">Carga de participantes</h2>

  <input type="file" id="fileInput"><br><br>

  <input id="numeroInput" maxlength="3" placeholder="000">
  <button id="btnAgregar" onclick="agregarNumero()">Agregar</button>

  <p id="contador"></p>
  <p id="porcentaje"></p>
  <p id="dup"></p>

  <button onclick="finalizar()">Finalizar sorteo</button>
</div>

<!-- SORTEO -->
<div id="sorteo" class="container hidden">
  <h2 class="neon">Sorteo en vivo</h2>

  <div id="info"></div>

  <div>
    <div class="slot" id="s0">?</div>
    <div class="slot" id="s1">?</div>
    <div class="slot" id="s2">?</div>
  </div>

  <button id="b0" onclick="tirar(0)">Centena</button>
  <button id="b1" onclick="tirar(1)">Decena</button>
  <button id="b2" onclick="tirar(2)">Unidad</button>

  <p id="posibles"></p>
  <h2 id="resultado"></h2>

  <button onclick="agregarDesdeSorteo()">Agregar un nuevo número</button>
  <button onclick="volver()">Volver al inicio</button>
</div>

<script>
let numeros = [];
let duplicados = 0;
let resultado = ["?","?","?"];

/* MUSICA PERSISTENTE */
let isPlaying = localStorage.getItem("music") === "on";
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

if (isPlaying) {
  music.play().catch(()=>{});
  btn.textContent="🎵";
}

btn.onclick = () => {
  isPlaying = !isPlaying;
  localStorage.setItem("music", isPlaying ? "on" : "off");
  if (isPlaying) { music.play().catch(()=>{}); btn.textContent="🎵"; }
  else { music.pause(); btn.textContent="🔇"; }
};

/* NAV */
function irCarga(){
  home.classList.add("hidden");
  carga.classList.remove("hidden");
  numeroInput.focus();
}

/* FINALIZAR */
function finalizar(){
  if(!numeros.length){
    alert("Debe cargar al menos un número válido.");
    return;
  }

  if(!confirm("¿Está seguro que desea finalizar la carga?")) return;

  carga.classList.add("hidden");
  sorteo.classList.remove("hidden");

  info.innerHTML = `
    Participación: ${(numeros.length/1000*100).toFixed(1)}%<br>
    Duplicados: ${duplicados}
  `;
}

/* INPUT UX */
numeroInput.addEventListener("input",()=>{
  if(numeroInput.value.length===3) btnAgregar.focus();
});
numeroInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") agregarNumero();
});

/* CARGA */
function agregarNumero(){
  let n = numeroInput.value;

  if(!/^\d{3}$/.test(n)){
    alert("El número debe tener exactamente 3 dígitos numéricos.");
    return;
  }

  if(numeros.includes(n)) duplicados++;

  numeros.push(n);
  numeroInput.value="";
  numeroInput.focus();
  actualizar();
}

/* EXCEL VALIDACION FUERTE */
fileInput.addEventListener("change",e=>{
  let f = e.target.files[0];

  if(!f.name.toLowerCase()==="sorteo.xlsx"){
    alert("El archivo debe llamarse exactamente 'sorteo.xlsx'.");
    return;
  }

  if(!f.name.endsWith(".xlsx")){
    alert("El archivo debe ser formato .xlsx.");
    return;
  }

  let reader=new FileReader();
  reader.onload=evt=>{
    let wb=XLSX.read(evt.target.result,{type:"array"});
    let rows=XLSX.utils.sheet_to_json(
      wb.Sheets[wb.SheetNames[0]],{header:1}
    );

    let errores=[];

    rows.forEach((r,i)=>{
      let val=r[0];
      if(!/^\d{3}$/.test(val)){
        errores.push(`Fila ${i+1}: valor inválido (${val})`);
        return;
      }
      if(numeros.includes(val)) duplicados++;
      numeros.push(val);
    });

    if(errores.length){
      alert("Errores detectados:\n"+errores.slice(0,5).join("\n"));
    }

    actualizar();
  };
  reader.readAsArrayBuffer(f);
});

/* STATS */
function actualizar(){
  contador.innerText=`${numeros.length} / 999 cargados`;
  porcentaje.innerText=`${((numeros.length/999)*100).toFixed(1)}%`;
  dup.innerText=`Duplicados: ${duplicados}`;
}

/* SORTEO */
function tirar(pos){
  if(resultado[pos]!=="?") return;

  let slot=document.getElementById("s"+pos);
  slot.classList.add("spin");

  let n=Math.floor(Math.random()*10);

  setTimeout(()=>{
    slot.textContent=n;
    resultado[pos]=n;
    document.getElementById("b"+pos).disabled=true;

    mostrarPosibles(pos);

    if(!resultado.includes("?")) checkGanador();
  },300);
}

/* POSIBLES */
function mostrarPosibles(pos){
  let filtrados=numeros;

  if(resultado[0]!=="?")
    filtrados=filtrados.filter(n=>n[0]==resultado[0]);

  if(resultado[1]!=="?")
    filtrados=filtrados.filter(n=>n[1]==resultado[1]);

  let set=new Set();

  if(pos===0){
    filtrados.forEach(n=>set.add(n[1]));
    posibles.innerText=set.size
      ? "Posibles decena: "+[...set].sort().join(", ")
      : "No hay combinaciones posibles";
  }

  if(pos===1){
    filtrados.forEach(n=>set.add(n[2]));
    posibles.innerText=set.size
      ? "Posibles unidad: "+[...set].sort().join(", ")
      : "No hay combinaciones posibles";
  }
}

/* RESULTADO */
function checkGanador(){
  let num=resultado.join("");
  let ganadores=numeros.filter(n=>n===num);

  if(ganadores.length){
    resultado.innerText=
      ganadores.length===1
        ? "🎉 Hay 1 ganador"
        : `🎉 Tenemos ${ganadores.length} ganadores`;
    document.body.classList.add("win");
  }else{
    resultado.innerText="Hoy no hay premio";
  }
}

/* AGREGAR DESDE SORTEO */
function agregarDesdeSorteo(){
  let nuevo=prompt("Ingrese número de 3 cifras:");
  if(!/^\d{3}$/.test(nuevo)){
    alert("Número inválido.");
    return;
  }
  if(numeros.includes(nuevo)) duplicados++;
  numeros.push(nuevo);
  actualizar();
}

/* RESET */
function volver(){
  if(resultado.includes("?")){
    alert("Debe completar el sorteo antes de salir.");
    return;
  }
  location.reload();
}

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
